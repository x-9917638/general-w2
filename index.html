<html>
    <head>
        <meta charset="utf-8" />
        <title>Clicker Game</title>
        <link rel="stylesheet" href="static/styles.css" />
    </head>
    <body>
        <main>
            <aside id="stats-panel">
                <div id="stat-items">
                    <h2>Stats</h2>
                </div>
            </aside>
            <section id="game-area">
                <p>Money: $<span id="money-count">0.00</span></p>

                <button id="clicker">Click me</button>
                <br />
                <button id="save" onclick="saveProgress()">
                    Save Progress
                </button>
                <br />
                <button id="clear" onclick="clearProgress()">
                    Reset Progress
                </button>
            </section>
            <aside id="shop-panel">
                <div id="shop-items">
                    <h2>Shop</h2>
                </div>
            </aside>
        </main>

        <script src="static/main.js"></script>
    </body>
</html>
